<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEF Tool — Admin Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen p-6">
    <main class="max-w-md mx-auto mt-16 bg-white border border-slate-200 rounded-lg shadow-sm p-6">
        <h1 class="text-2xl font-bold">Admin access</h1>
        <p class="text-slate-600 text-sm mt-2">Enter the secret key to open the overlay admin page.</p>

        {% if error %}
            <p class="mt-4 text-sm text-red-700" role="alert">{{ error }}</p>
        {% endif %}

        <form method="post" action="{{ url_for('admin') }}" class="mt-6 space-y-4">
            <input type="hidden" name="next" value="{{ next_url }}">
            <label class="block text-sm font-medium">
                Secret key
                <input
                    type="password"
                    name="secret_key"
                    class="mt-1 w-full border border-slate-300 rounded px-3 py-2 text-sm"
                    autocomplete="current-password"
                    autofocus
                    required
                >
            </label>
            <button type="submit" class="w-full px-4 py-2 rounded bg-blue-600 text-white font-medium hover:bg-blue-700">
                Open admin page
            </button>
        </form>
    </main>
</body>
</html>
