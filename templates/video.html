<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Background video</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            position: relative;
            overflow-x: hidden;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            color: #fff;
            background: #000;
        }

        /* Full-viewport layer above page background, below overlay (avoid z-index: -1 — it can hide the video). */
        .bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
        }

        .overlay {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        .overlay h1 {
            font-size: clamp(1.75rem, 5vw, 3rem);
            font-weight: 600;
            margin: 0 0 0.5rem;
        }

        .overlay p {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            opacity: 0.9;
            margin: 0;
        }
    </style>
</head>
<body>
    <video
        id="vid"
        class="bg-video"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
    >
        <source src="{{ video_url }}" type="video/mp4">
    </video>

    <div class="overlay">
        <h1>{{ text }}</h1>
        <p>Status: running</p>
    </div>

    <script>
        (function () {
            var v = document.querySelector(".bg-video");
            if (!v) return;
            function start() {
                v.muted = false;
                var p = v.play();
                if (p && p.catch) {
                    p.catch(function () {
                        v.muted = true;
                        return v.play();
                    });
                }
            }
            if (v.readyState >= 2) start();
            else v.addEventListener("canplay", start, { once: true });
        })();
    </script>
</body>
</html>
