<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Background video</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            position: relative;
            overflow-x: hidden;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            color: #fff;
            background: #000;
        }

        .bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
        }

        .overlay {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        .overlay h1 {
            font-size: clamp(1.75rem, 5vw, 3rem);
            font-weight: 600;
            margin: 0 0 0.5rem;
        }

        .overlay p {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            opacity: 0.9;
            margin: 0;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
</head>
<body>
    <script type="application/json" id="v2-hls-boot">{{ hls_boot | tojson }}</script>
    <video
        id="vid"
        class="bg-video"
        autoplay
        muted
        playsinline
        preload="auto"
    >
        <source src="{{ video_url }}" type="video/mp4">
    </video>

    <div class="overlay">
        <h1>{{ text }}</h1>
        <p>Status: running</p>
    </div>

    <script>
        (function () {
            "use strict";

            var LOG = "[video_hls2]";
            var v = document.getElementById("vid");
            if (!v) return;

            var bootEl = document.getElementById("v2-hls-boot");
            var hlsBoot = {};
            try {
                hlsBoot = JSON.parse(bootEl ? bootEl.textContent : "{}");
            } catch (e) {
                console.error(LOG, "bad boot json", e);
            }

            var FALLBACK_SRC = {{ video_url | tojson }};
            var hlsClient = null;
            var lastSeq = -1;

            function errToString(err) {
                if (err == null) return "null/undefined";
                if (err instanceof Error) {
                    return err.name + ": " + err.message;
                }
                if (typeof err === "object") {
                    try {
                        return JSON.stringify(err);
                    } catch (e) {
                        return String(err);
                    }
                }
                return String(err);
            }

            /**
             * Reports the same string to the server log (Flask stdout) and the browser console.
             * Does not change the on-screen overlay (always matches video.html).
             */
            function reportClientError(message) {
                var line = LOG + " " + (message == null ? "" : String(message));
                console.error(line);
                if (typeof fetch === "undefined") {
                    return;
                }
                fetch("/api/hls/client-error", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: line })
                }).catch(function (fe) {
                    console.error(LOG, "client-error POST failed (server down?)", fe);
                });
            }

            function destroyHls() {
                if (hlsClient) {
                    try {
                        hlsClient.destroy();
                    } catch (e) {
                        reportClientError("hls.destroy: " + errToString(e));
                    }
                    hlsClient = null;
                }
            }

            function loadStaticVideo() {
                destroyHls();
                v.loop = true;
                v.removeAttribute("src");
                v.innerHTML = "<source src=" + JSON.stringify(FALLBACK_SRC) + ' type="video/mp4">';
                v.load();
                startPlayback();
            }

            function startPlayback() {
                v.muted = false;
                var p = v.play();
                if (p && p.catch) {
                    p.catch(function () {
                        v.muted = true;
                        return v.play();
                    });
                }
            }

            // Avoid downloading MP4 when the boot snapshot says we should use HLS first.
            (function maybeStripInitialMp4() {
                if (hlsBoot && hlsBoot.enabled && hlsBoot.url) {
                    v.removeAttribute("src");
                    v.innerHTML = "";
                    try {
                        v.load();
                    } catch (e) {
                        reportClientError("load() after strip: " + errToString(e));
                    }
                }
            })();

            // Same as video.html: unmute+play for the default MP4 path until HLS is applied.
            (function staticAutoplayIfNoHlsFirst() {
                if (hlsBoot && hlsBoot.enabled && hlsBoot.url) {
                    return;
                }
                if (v.readyState >= 2) {
                    startPlayback();
                } else {
                    v.addEventListener(
                        "canplay",
                        function () {
                            startPlayback();
                        },
                        { once: true }
                    );
                }
            })();

            function canPlayNativeHls() {
                return v.canPlayType("application/vnd.apple.mpegurl");
            }

            function hlsErrorPayload(data) {
                if (!data || typeof data !== "object") {
                    return errToString(data);
                }
                var o = {
                    type: data.type,
                    details: data.details,
                    fatal: data.fatal,
                    url: data.url,
                };
                if (data.error) o.error = data.error;
                if (data.reason) o.reason = data.reason;
                return errToString(o);
            }

            function loadHlsUrl(url) {
                if (!url) {
                    reportClientError("loadHlsUrl: empty url");
                    return;
                }
                destroyHls();
                v.loop = false;
                v.removeAttribute("src");
                v.innerHTML = "";
                v.load();

                if (typeof Hls !== "undefined" && Hls.isSupported()) {
                    hlsClient = new Hls({ enableWorker: true, lowLatencyMode: false });
                    hlsClient.on(Hls.Events.ERROR, function (ev, data) {
                        if (data && data.fatal) {
                            reportClientError("hls.js fatal: " + hlsErrorPayload(data));
                            try {
                                hlsClient.destroy();
                            } catch (e) {}
                            hlsClient = null;
                        } else {
                            console.warn(LOG, "hls.js non-fatal", data);
                        }
                    });
                    hlsClient.loadSource(url);
                    hlsClient.attachMedia(v);
                    hlsClient.on(Hls.Events.MANIFEST_PARSED, function () {
                        startPlayback();
                    });
                } else if (canPlayNativeHls()) {
                    v.src = url;
                    v.addEventListener(
                        "error",
                        function () {
                            var ve = v.error;
                            var code = ve ? ve.code : "unknown";
                            var msg = ve ? (ve.message || "media error") : "unknown";
                            reportClientError("native HLS <video> error: code=" + code + " " + msg);
                        },
                        { once: true }
                    );
                    v.addEventListener(
                        "loadedmetadata",
                        function onMeta() {
                            v.removeEventListener("loadedmetadata", onMeta);
                            startPlayback();
                        },
                        { once: true }
                    );
                } else {
                    reportClientError("HLS not supported: no hls.js MSE and no native application/vnd.apple.mpegurl");
                }
            }

            function applyHlsState(h) {
                if (!h || typeof h !== "object") {
                    return;
                }
                var seq = parseInt(h.seq, 10);
                if (Number.isFinite(seq)) {
                    if (seq === lastSeq) {
                        return;
                    }
                    lastSeq = seq;
                }
                if (!h.enabled) {
                    loadStaticVideo();
                    return;
                }
                if (h.url) {
                    loadHlsUrl(h.url);
                } else {
                    reportClientError("HLS enabled but hls.url is empty; falling back to static MP4");
                    loadStaticVideo();
                }
            }

            function onOverlayPayload(payload) {
                if (!payload || !payload.hls) {
                    return;
                }
                applyHlsState(payload.hls);
            }

            // 1) Fresh state from API when the server is up. If the server is not responding, use boot JSON from this HTML and still try HLS when enabled in admin.
            (function connectApi() {
                if (typeof fetch === "undefined") {
                    applyHlsState(hlsBoot);
                    return;
                }
                fetch("/api/overlay")
                    .then(function (res) {
                        if (!res.ok) {
                            throw new Error("GET /api/overlay HTTP " + res.status + " " + res.statusText);
                        }
                        return res.json();
                    })
                    .then(function (data) {
                        onOverlayPayload(data);
                    })
                    .catch(function (err) {
                        reportClientError("GET /api/overlay failed: " + errToString(err) + " — using boot hls and still attempting HLS if enabled there");
                        applyHlsState(hlsBoot);
                    });
            })();

            // 2) Live updates from admin (when SSE works)
            if (typeof EventSource !== "undefined") {
                var es = new EventSource("/api/stream");
                es.addEventListener("message", function (e) {
                    try {
                        var data = JSON.parse(e.data);
                        onOverlayPayload(data);
                    } catch (err) {
                        reportClientError("SSE parse: " + errToString(err));
                    }
                });
                es.addEventListener("error", function () {
                    // Browser auto-reconnects; do not change UI.
                    console.warn(LOG, "SSE /api/stream error (will retry if possible)");
                });
            }
        })();
    </script>
</body>
</html>
